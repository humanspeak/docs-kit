name: Release

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - 'src/**'
            - 'package.json'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.ACTIONS_KEY }}

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install and build
              run: |
                  pnpm install --prefer-offline --frozen-lockfile --ignore-scripts
                  pnpm build

            - name: Generate CalVer tag
              id: calver
              run: |
                  YEAR=$(date +%Y)
                  MONTH=$(date +%-m)
                  PREFIX="${YEAR}.${MONTH}"

                  # Find highest micro for this month
                  LATEST=$(git tag --list "${PREFIX}.*" --sort=-version:refname | head -n1)
                  if [ -z "$LATEST" ]; then
                    MICRO=1
                  else
                    MICRO=$(echo "$LATEST" | awk -F. '{print $3 + 1}')
                  fi

                  TAG="${PREFIX}.${MICRO}"
                  echo "tag=$TAG" >> $GITHUB_OUTPUT

            - name: Import GPG key
              id: import_gpg
              uses: crazy-max/ghaction-import-gpg@v6
              with:
                  gpg_private_key: ${{ secrets.ACTIONS_GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.ACTIONS_GPG_PASSPHRASE }}
                  git_user_signingkey: true
                  git_tag_gpgsign: true

            - name: Create tag and release
              env:
                  GITHUB_TOKEN: ${{ secrets.ACTIONS_KEY }}
                  TAG: ${{ steps.calver.outputs.tag }}
              run: |
                  git tag -a "$TAG" -m "Release $TAG"
                  git push origin "$TAG"
                  gh release create "$TAG" --title "Release $TAG" --generate-notes
